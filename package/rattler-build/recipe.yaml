context:
  version: "26.3.2RC1"

package:
  name: freecad
  version: "${{ version }}"

source:
  path: ../..
  use_gitignore: true

build:
  number: 0
  script:
    env:
      # rattler-build runs the build in a sandbox that does not inherit shell
      # variables, so any ccache settings must be forwarded explicitly here.
      # CCACHE_DIR is empty for local builds; build.sh/build.bat unset it in that
      # case so ccache falls back to its own default cache location.
      CCACHE_DIR: ${{ env.get("CCACHE_DIR", default="") }}
      # Cap the cache so CI stays within the 10 GB GitHub Actions cache budget.
      CCACHE_MAXSIZE: ${{ env.get("CCACHE_MAXSIZE", default="5G") }}
      # Hash compiler *content* rather than mtime so cached objects survive the
      # fresh conda extraction on each CI run (where compiler mtimes change).
      CCACHE_COMPILERCHECK: ${{ env.get("CCACHE_COMPILERCHECK", default="content") }}

requirements:
  build:
    - ccache
    - cmake
    - compilers>=1.10,<1.11
    - doxygen
    - gtest
    - ninja
    - noqt5
    - python>=3.11,<3.12
    - qt6-main>=6.8,<6.9
    - swig>=4.3,<4.4

    - if: linux and x86_64
      then:
        - clang
        - clangxx
        - kernel-headers_linux-64
        - libdrm-cos7-x86_64
        - libselinux-cos7-x86_64
        - libsepol-cos7-x86_64
        - libspnav
        - libx11-common-cos7-x86_64
        - libx11-cos7-x86_64
        - libxau-cos7-x86_64
        - libxcb-cos7-x86_64
        - libxdamage-cos7-x86_64
        - libxext-cos7-x86_64
        - libxfixes-cos7-x86_64
        - libxi-cos7-x86_64
        - libxi-devel-cos7-x86_64
        - libxxf86vm-cos7-x86_64
        - mesa-dri-drivers-cos7-x86_64
        - mesa-libegl-cos7-x86_64
        - mesa-libegl-devel-cos7-x86_64
        - mesa-libgl-cos7-x86_64
        - mesa-libgl-devel-cos7-x86_64
        - mold
        - patchelf
        - pixman-cos7-x86_64
        - sed
        - sysroot_linux-64
        - xcb-util-cursor==0.1.5  ## hack to address https://github.com/FreeCAD/FreeCAD/issues/26726
        - xorg-x11-server-common-cos7-x86_64
        - xorg-x11-server-xvfb-cos7-x86_64
        - xorg-xproto

    - if: linux and aarch64
      then:
        - clang
        - clangxx
        - kernel-headers_linux-aarch64
        - libdrm-cos7-aarch64
        - libselinux-cos7-aarch64
        - libsepol-cos7-aarch64
        - libspnav
        - libx11-common-cos7-aarch64
        - libx11-cos7-aarch64
        - libxau-cos7-aarch64
        - libxcb-cos7-aarch64
        - libxdamage-cos7-aarch64
        - libxext-cos7-aarch64
        - libxfixes-cos7-aarch64
        - libxi-cos7-aarch64
        - libxi-devel-cos7-aarch64
        - libxxf86vm-cos7-aarch64
        - mesa-dri-drivers-cos7-aarch64
        - mesa-libegl-cos7-aarch64
        - mesa-libegl-devel-cos7-aarch64
        - mesa-libgl-cos7-aarch64
        - mesa-libgl-devel-cos7-aarch64
        - mold
        - patchelf
        - pixman-cos7-aarch64
        - sed
        - sysroot_linux-aarch64
        - xcb-util-cursor==0.1.5  ## hack to address https://github.com/FreeCAD/FreeCAD/issues/26726
        - xorg-x11-server-common-cos7-aarch64
        - xorg-x11-server-xvfb-cos7-aarch64
        - xorg-xproto

    - if: osx and x86_64
      then:
        - __osx >=10.13

    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}

  host:
    - coin3d ==4.0.3
    - eigen >=3.3,<5
    - fmt >=12.1,<12.2
    - freetype
    - hdf5
    - lark
    - libboost-devel
    - matplotlib-base
    - noqt5
    - numpy>=1.26,<2
    - occt>=7.8,<7.9
    - pcl
    - pivy
    - ply
    - pybind11
    - pyside6
    - python>=3.11,<3.12
    - qt6-main>=6.8,<6.9
    - six
    - smesh
    - vtk
    - xerces-c
    - yaml-cpp
    - zlib

    - if: win
      then:
        - winpthreads-devel
        - tbb-devel

    - if: unix
      then:
        - sed

    - if: linux
      then:
        - libspnav
        - xorg-xproto

  run:
    - blas * openblas*
    - blinker
    - calculix
    - debugpy
    - defusedxml
    - docutils
    - gmsh
    - graphviz
    - ifcopenshell
    - lark
    - lxml
    - matplotlib-base
    - nine
    - noqt5
    - numpy>=1.26,<2
    - occt>=7.8,<7.9
    - olefile
    - opencamlib
    - opencv
    - pandas
    - pip
    - pivy
    - ply
    - pycollada
    - pyside6
    - python>=3.11,<3.12
    - pythonocc-core
    - pyyaml
    - qt6-main>=6.8,<6.9
    - requests
    - scipy
    - sympy
    - typing_extensions
    - vtk
    - xlutils

    - if: linux
      then:
        - libspnav
        - qt6-wayland
        - xcb-util-cursor==0.1.5  ## hack to address https://github.com/FreeCAD/FreeCAD/issues/26726
