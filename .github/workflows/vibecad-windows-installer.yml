name: VibeCAD Windows Installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update. Leave empty for windows-build-YYYYMMDD-SHA."
        required: false
        type: string
  push:
    tags:
      - "windows-build-*"

permissions:
  contents: write

jobs:
  metadata:
    name: Resolve Metadata
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      build_tag: ${{ steps.meta.outputs.build_tag }}
    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          elif [[ -n "${INPUT_RELEASE_TAG}" ]]; then
            release_tag="${INPUT_RELEASE_TAG}"
          else
            short_sha="${GITHUB_SHA:0:12}"
            release_tag="windows-build-$(date -u +%Y%m%d)-${short_sha}"
          fi

          build_tag="${release_tag//\//-}"
          build_tag="${build_tag// /-}"

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "build_tag=${build_tag}" >> "${GITHUB_OUTPUT}"

  windows:
    name: Build Windows Installer
    needs: metadata
    runs-on: windows-2022
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Pixi
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "${HOME}/.pixi/bin" >> "${GITHUB_PATH}"

      - name: Restore Pixi and Python caches
        id: cache-pixi-windows
        uses: actions/cache/restore@v4
        with:
          path: |
            package/rattler-build/.pixi
            ~\AppData\Local\pixi
            ~\AppData\Local\rattler
            ~\AppData\Local\pip\Cache
          key: pixi-windows-${{ hashFiles('package/rattler-build/pixi.lock', 'package/rattler-build/pixi.toml', 'package/rattler-build/recipe.yaml', 'src/Mod/VibeCAD/requirements.txt', 'src/Mod/VibeCAD/build123d-requirements.txt', 'package/rattler-build/scripts/install_vibecad_provider_deps.sh', 'package/rattler-build/scripts/install_vibecad_build123d_runtime.sh', 'package/rattler-build/scripts/write_vibecad_build123d_manifest.py') }}
          restore-keys: |
            pixi-windows-

      - name: Report Windows cache status
        shell: bash
        run: |
          echo "cache-hit=${{ steps.cache-pixi-windows.outputs.cache-hit }}"
          echo "matched-key=${{ steps.cache-pixi-windows.outputs.cache-matched-key }}"
          echo "primary-key=${{ steps.cache-pixi-windows.outputs.cache-primary-key }}"

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}\ccache
          # Rolling key: every run saves a fresh entry and restores the most recent
          # prior one via restore-keys, so ccache updates each build. Shares the
          # ccache-windows-* pool with the release workflow (identical win-64 recipe).
          key: ccache-windows-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ccache-windows-

      - name: Build FreeCAD package environment
        shell: bash
        working-directory: package/rattler-build
        env:
          CCACHE_DIR: ${{ runner.temp }}\ccache
          CCACHE_MAXSIZE: "2G"
        run: |
          set -euo pipefail
          pixi install -e default
          pixi install -e package

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}\ccache
          key: ccache-windows-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Create Windows bundle and installer
        shell: bash
        working-directory: package/rattler-build
        env:
          BUILD_TAG: ${{ needs.metadata.outputs.build_tag }}
          MAKE_INSTALLER: "true"
          UPLOAD_RELEASE: "false"
          WINDOWS_SIGN_RELEASE: "0"
        run: |
          set -euo pipefail
          pixi run -e package create_bundle

      - name: Save Pixi and Python caches
        if: always() && steps.cache-pixi-windows.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            package/rattler-build/.pixi
            ~\AppData\Local\pixi
            ~\AppData\Local\rattler
            ~\AppData\Local\pip\Cache
          key: ${{ steps.cache-pixi-windows.outputs.cache-primary-key }}

      - name: Publish GitHub release
        shell: bash
        working-directory: package/rattler-build/windows
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
        run: |
          set -euo pipefail

          mapfile -d '' release_files < <(
            find . -maxdepth 1 -type f \
              \( -name '*.7z' -o -name '*.exe' -o -name '*SHA256.txt' \) \
              -print0
          )
          if [[ "${#release_files[@]}" -eq 0 ]]; then
            echo "No Windows release assets were produced." >&2
            exit 1
          fi

          cat > release-notes.md <<EOF
          VibeCAD Windows build ${RELEASE_TAG}

          Assets:
          - Windows NSIS installer executable.
          - Windows portable 7z bundle.
          - SHA256 files for both packages.

          This build includes the integrated VibeCAD workbench and VibeCAD themes.
          EOF

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload --clobber "${RELEASE_TAG}" "${release_files[@]}"
          else
            gh release create "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "VibeCAD Windows ${RELEASE_TAG}" \
              --prerelease \
              --notes-file release-notes.md \
              "${release_files[@]}"
          fi
